<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bootstrap 5 ScrollSpy</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            position: relative;
        }

        p {
            font-size: 18px;
        }

        #section1 {
            padding-top: 70px;
            height: 500px;
            color: white;
            background-color: orange;
        }

        #section2 {
            padding-top: 70px;
            height: 500px;
            color: green;
            background-color: white;
        }
    </style>
</head>

<body data-bs-spy="scroll" data-bs-target="#navbar" data-bs-offset="70" tabindex="0">

    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-dark bg-dark fixed-top navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Codingal</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="#section1">Section 1</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#section2">Section 2</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Section 1 -->
    <div id="section1" class="container-fluid">
        <h1>Section 1</h1>
        <h3>Codingal</h3>
        <h5>Codingal is on a mission to inspire school kids to fall in love with coding.</h5>
        <p>Scroll this section.</p>
    </div>

    <!-- Section 2 -->
    <div id="section2" class="container-fluid">
        <h1>Section 2</h1>
        <h3>Codingal</h3>
        <h5>Vivek Prakash and Satyam Barnawal are the founders of Codingal.</h5>
        <p>Scroll this section.</p>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
